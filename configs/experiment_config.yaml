# Experiment configuration — single source of truth for model, benchmark,
# generation, probing, and patching settings.
#
# STATUS: locked 2026-07-08 at Phase 0 gate closure. Model and benchmark are
# committed decisions — see RESEARCH_LOG.md 2026-07-08 for the evidence.

model:
  primary: Qwen/Qwen2.5-1.5B-Instruct  # confirmed: 28% fail rate at n=25, legible F3 dynamics
  fallback: null

benchmark:
  suite: evalplus                       # confirmed post-spike (HumanEval alone has weak test coverage)
  subsets: [humaneval, mbpp]

generation:
  temperature: 0.2
  max_new_tokens: 512
  correction_rounds: 3
  n_per_problem: 25

probing:
  regularization: l1
  C_sweep: [0.001, 0.01, 0.1, 1.0]
  layers: all                           # probe every layer, then focus on signal layers
  components: [residual_stream, attn_heads, mlp_out]

patching:
  target_failure_types: [F2, F1]        # F3/F4 are stretch goals
  effect_metric: delta_pass_rate

labels:
  # Per-stage failure taxonomy. Every (problem, stage, attempt) tuple gets one label.
  classes: [P, F1, F2, F3, F4]
  min_examples_per_failure_class: 50
